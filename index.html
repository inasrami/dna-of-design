<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNA of Design</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          },
          colors: {
            terracotta: {
              500: '#D97757',
              600: '#C56343',
              700: '#A64D2F',
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, #e7e5e4 25%, #f5f5f4 50%, #e7e5e4 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
  </style>
</head>
<body class="bg-[#F9F8F6] text-stone-800 min-h-screen font-sans selection:bg-terracotta-500 selection:text-white">
  
  <header class="text-center pt-16 pb-10 border-b border-stone-200">
    <h1 class="text-5xl font-serif font-semibold text-stone-900 tracking-tight">
      DNA of Design
    </h1>
    <p class="mt-4 text-stone-500 font-medium italic">Extract structural color palettes from any digital canvas.</p>
  </header>

  <main class="container mx-auto px-4 py-12 max-w-4xl">
    
    <section class="max-w-2xl mx-auto bg-white border border-stone-200 rounded-xl p-6 shadow-sm">
      <div class="flex flex-col md:flex-row gap-3">
        <input
          id="urlInput"
          type="text"
          placeholder="Enter website URL (e.g., https://google.com)"
          class="flex-1 px-4 py-3 rounded-lg bg-stone-50 border border-stone-300 focus:outline-none focus:ring-2 focus:ring-terracotta-500 focus:border-terracotta-500 placeholder-stone-400 text-stone-700 transition-shadow"
        />
        <button
          id="analyzeBtn"
          class="px-8 py-3 bg-terracotta-600 hover:bg-terracotta-700 rounded-lg text-white font-medium transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-terracotta-500"
        >
          Analyze
        </button>
      </div>
    </section>

    <section id="results" class="mt-12">
      
      <div id="emptyState" class="text-center py-20 bg-white border border-stone-200 rounded-xl shadow-sm">
        <div class="mx-auto w-20 h-20 bg-stone-50 rounded-full flex items-center justify-center mb-6 border border-stone-100">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-stone-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </div>
        <h3 class="text-xl font-serif font-semibold text-stone-800">Awaiting Input</h3>
        <p class="mt-2 text-stone-500 max-w-md mx-auto">Provide a URL above to capture its visual identity and extract its dominant palette.</p>
      </div>

      </section>
  </main>

  <footer class="text-center text-sm text-stone-400 mt-20 py-8 border-t border-stone-200">
    Built by Inas Rami · <a href="https://github.com/inasrami" class="text-stone-500 hover:text-terracotta-600 transition-colors">GitHub</a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
